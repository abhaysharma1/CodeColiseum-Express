services:
  backend:
    image: node:20-alpine
    container_name: codecoliseum-backend-dev
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      PORT: "5000"
      FRONTEND_URL: http://localhost:3000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/codecoliseum?schema=express
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      SQS_ENDPOINT: http://localstack:4566
      SQS_EXAM_QUEUE_URL: http://localstack:4566/000000000000/codecoliseum-exam
      SQS_PRACTICE_QUEUE_URL: http://localstack:4566/000000000000/codecoliseum-practice
      SQS_AI_EVAL_QUEUE_URL: http://localstack:4566/000000000000/codecoliseum-ai-eval
      SQS_AI_CHAT_QUEUE_URL: http://localstack:4566/000000000000/codecoliseum-ai-chat
      GMAIL_USER: ""
      GMAIL_APP_PASSWORD: ""
    volumes:
      - ./:/app
      - backend_node_modules:/app/node_modules
    networks:
      - codecoliseum

volumes:
  backend_node_modules:

networks:
  codecoliseum:
    name: codecoliseum
    driver: bridge
